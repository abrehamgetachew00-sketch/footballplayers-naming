<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Player Name Game | AI Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            color: #1a472a;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        /* Game Info */
        .game-info {
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            text-align: center;
        }

        .current-letter {
            font-size: 5em;
            font-weight: bold;
            background: white;
            color: #1a472a;
            display: inline-block;
            width: 120px;
            height: 120px;
            line-height: 120px;
            text-align: center;
            border-radius: 50%;
            margin: 10px auto;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .turn-indicator {
            font-size: 1.2em;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
        }

        .turn-human {
            background: #3498db;
        }

        .turn-ai {
            background: #e74c3c;
        }

        /* Players Area */
        .players-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .player-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 3px solid #ddd;
            transition: all 0.3s;
        }

        .player-card.active {
            border-color: #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
        }

        .player-card.eliminated {
            opacity: 0.5;
            background: #e0e0e0;
        }

        .player-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .player-status {
            font-size: 0.9em;
            color: #666;
        }

        .player-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        /* Used Players */
        .used-players {
            background: #f0f0f0;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
        }

        .used-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: #555;
        }

        .used-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .used-tag {
            background: #1a472a;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .player-input {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 15px;
            outline: none;
        }

        .player-input:focus {
            border-color: #1a472a;
        }

        .submit-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .out-btn {
            background: #e74c3c;
            color: white;
        }

        .new-game-btn {
            background: #3498db;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        /* Message */
        .message {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* Winner Modal */
        .winner-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .winner-content {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 400px;
        }

        .winner-emoji {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .winner-name {
            font-size: 2em;
            font-weight: bold;
            color: #1a472a;
            margin-bottom: 20px;
        }

        .play-again-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #1a472a, #0d2818);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1em;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .players-area {
                grid-template-columns: 1fr;
            }
            .current-letter {
                width: 80px;
                height: 80px;
                line-height: 80px;
                font-size: 3em;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>⚽ FOOTBALL PLAYER NAME GAME ⚽</h1>
        <div class="subtitle">AI chooses a letter - You name professional football players!</div>

        <div class="game-info">
            <div>🎯 Current Letter</div>
            <div class="current-letter" id="currentLetter">?</div>
            <div class="turn-indicator" id="turnIndicator">🎮 Click New Game to Start</div>
        </div>

        <div class="players-area">
            <div class="player-card" id="humanCard">
                <div class="player-icon">👤</div>
                <div class="player-name">YOU</div>
                <div class="player-status" id="humanStatus">Ready</div>
            </div>
            <div class="player-card" id="aiCard">
                <div class="player-icon">🤖</div>
                <div class="player-name">AI</div>
                <div class="player-status" id="aiStatus">Ready</div>
            </div>
        </div>

        <div class="used-players">
            <div class="used-title">📝 Used Players (Cannot repeat)</div>
            <div class="used-list" id="usedList"></div>
        </div>

        <div class="input-area">
            <input type="text" class="player-input" id="playerInput" placeholder="Enter professional footballer name...">
            <button class="submit-btn" id="submitBtn">⚡ Submit</button>
        </div>

        <div class="action-buttons">
            <button class="action-btn out-btn" id="outBtn">🚪 I AM OUT</button>
            <button class="action-btn new-game-btn" id="newGameBtn">🔄 New Game</button>
        </div>

        <div class="message" id="message">
            Click "New Game" to start! The AI will randomly pick a letter.
        </div>
    </div>

    <script>
        // ============================================
        // PROFESSIONAL FOOTBALL PLAYERS DATABASE
        // ============================================
        const playersByLetter = {
            'A': ['Aaron Wan-Bissaka', 'Aboubakar', 'Sergio Aguero', 'David Alaba', 'Alisson Becker', 'Antony', 'Trent Alexander-Arnold', 'Pierre-Emerick Aubameyang', 'Cesar Azpilicueta', 'Marco Asensio', 'Nicolas Anelka', 'Dele Alli'],
            'B': ['Gareth Bale', 'Jude Bellingham', 'Karim Benzema', 'Bernardo Silva', 'Bruno Fernandes', 'Sadio Mane', 'Leon Bailey', 'Charles Aranguiz'],
            'C': ['Joao Cancelo', 'Casemiro', 'Edinson Cavani', 'Philippe Coutinho', 'Andrew Robertson', 'Cristiano Ronaldo', 'Andy Carroll', 'Petr Cech'],
            'D': ['Kevin De Bruyne', 'Frenkie de Jong', 'Matthijs de Ligt', 'Paulo Dybala', 'Arjen Robben', 'Memphis Depay', 'Didier Drogba', 'Julian Draxler'],
            'E': ['Eden Hazard', 'Ederson', 'Christian Eriksen', 'Samuel Eto\'o', 'Cesc Fabregas', 'Radamel Falcao', 'Rio Ferdinand', 'Steven Gerrard'],
            'F': ['Fabinho', 'Falcao', 'Bruno Fernandes', 'Roberto Firmino', 'John Arne Riise', 'Wayne Rooney', 'Cristian Romero', 'James Rodriguez'],
            'G': ['Steven Gerrard', 'Olivier Giroud', 'Leon Goretzka', 'Mario Gotze', 'Antoine Griezmann', 'Ilkay Gundogan', 'Curtis Jones', 'Harry Kane'],
            'H': ['Eden Hazard', 'Kai Havertz', 'Lucas Hernandez', 'Gonzalo Higuain', 'Mats Hummels', 'Zlatan Ibrahimovic', 'Laurent Koscielny', 'Philipp Lahm'],
            'I': ['Zlatan Ibrahimovic', 'Romelu Lukaku', 'Raul Jimenez', 'Frenkie de Jong', 'Eder Militao', 'Lionel Messi', 'Thomas Muller', 'Manuel Neuer'],
            'J': ['Jude Bellingham', 'Curtis Jones', 'Phil Jones', 'Jorginho', 'Josko Gvardiol', 'Harry Kane', 'Moises Caicedo', 'Enzo Fernandez'],
            'K': ['Harry Kane', 'Moises Caicedo', 'N\'Golo Kante', 'Vincent Kompany', 'Toni Kroos', 'Frank Lampard', 'Robert Lewandowski', 'Kylian Mbappe'],
            'L': ['Frank Lampard', 'Robert Lewandowski', 'Kylian Mbappe', 'Lionel Messi', 'Luka Modric', 'Thomas Muller', 'Manuel Neuer', 'Christian Pulisic'],
            'M': ['Kylian Mbappe', 'Lionel Messi', 'Luka Modric', 'Thomas Muller', 'Manuel Neuer', 'Sadio Mane', 'Lautaro Martinez', 'Paul Pogba'],
            'N': ['Manuel Neuer', 'Sadio Mane', 'Lautaro Martinez', 'Paul Pogba', 'Christian Pulisic', 'Marcus Rashford', 'Andrew Robertson', 'Rodri'],
            'O': ['Victor Osimhen', 'Dani Olmo', 'Martin Odegaard', 'Nicolas Otamendi', 'Michael Owen', 'Park Ji-sung', 'Mesut Ozil', 'Dani Parejo'],
            'P': ['Paul Pogba', 'Christian Pulisic', 'Marcus Rashford', 'Andrew Robertson', 'Rodri', 'Cristiano Ronaldo', 'Bukayo Saka', 'Leroy Sane'],
            'Q': ['Nicolas Otamendi', 'Michael Owen', 'Mesut Ozil', 'Dani Parejo', 'Pedri', 'Ivan Perisic', 'Ricardo Pereira', 'Pierre-Emerick Aubameyang'],
            'R': ['Marcus Rashford', 'Andrew Robertson', 'Cristiano Ronaldo', 'Bukayo Saka', 'Leroy Sane', 'Jadon Sancho', 'Mohamed Salah', 'Neymar Jr'],
            'S': ['Bukayo Saka', 'Leroy Sane', 'Jadon Sancho', 'Mohamed Salah', 'Neymar Jr', 'Luis Suarez', 'Son Heung-min', 'Thiago Alcantara'],
            'T': ['Luis Suarez', 'Son Heung-min', 'Thiago Alcantara', 'Virgil van Dijk', 'Marco Verratti', 'Theo Walcott', 'Kyle Walker', 'Timothy Weah'],
            'U': ['Caglar Soyuncu', 'Toni Kroos', 'Viktor Tsygankov', 'Arturo Vidal', 'Ferran Torres', 'Paco Alcacer', 'Alphonso Davies', 'Sergio Gomez'],
            'V': ['Virgil van Dijk', 'Marco Verratti', 'Theo Walcott', 'Kyle Walker', 'Virgil van Dijk', 'Raphael Varane', 'Arturo Vidal', 'Thomas Vermaelen'],
            'W': ['Theo Walcott', 'Kyle Walker', 'Virgil van Dijk', 'Raphael Varane', 'Timothy Weah', 'Hakim Ziyech', 'Granit Xhaka', 'Axel Witsel'],
            'X': ['Granit Xhaka', 'Axel Witsel', 'Hakim Ziyech', 'Nicolo Zaniolo', 'Mario Balotelli', 'Xherdan Shaqiri', 'Diego Carlos', 'Federico Chiesa'],
            'Y': ['Granit Xhaka', 'Axel Witsel', 'Hakim Ziyech', 'Nicolo Zaniolo', 'Mario Balotelli', 'Ben Chilwell', 'Andre Onana', 'Dominic Calvert-Lewin'],
            'Z': ['Hakim Ziyech', 'Nicolo Zaniolo', 'Mario Balotelli', 'Ben Chilwell', 'Andre Onana', 'Dominic Calvert-Lewin', 'Tammy Abraham', 'Michy Batshuayi']
        };

        // Game state
        let currentLetter = '';
        let currentTurn = 'human'; // 'human' or 'ai'
        let gameActive = true;
        let humanEliminated = false;
        let aiEliminated = false;
        let usedPlayers = [];

        // DOM elements
        const currentLetterEl = document.getElementById('currentLetter');
        const turnIndicatorEl = document.getElementById('turnIndicator');
        const humanCard = document.getElementById('humanCard');
        const aiCard = document.getElementById('aiCard');
        const humanStatus = document.getElementById('humanStatus');
        const aiStatus = document.getElementById('aiStatus');
        const usedListEl = document.getElementById('usedList');
        const playerInput = document.getElementById('playerInput');
        const submitBtn = document.getElementById('submitBtn');
        const outBtn = document.getElementById('outBtn');
        const newGameBtn = document.getElementById('newGameBtn');
        const messageEl = document.getElementById('message');

        // Helper functions
        function showMessage(msg, isError = false) {
            messageEl.textContent = msg;
            messageEl.style.background = isError ? '#ffebee' : '#e8f5e9';
            messageEl.style.color = isError ? '#c62828' : '#2e7d32';
        }

        function updateUsedList() {
            if (usedPlayers.length === 0) {
                usedListEl.innerHTML = '<span style="color: #999;">No players used yet</span>';
            } else {
                usedListEl.innerHTML = usedPlayers.map(p => `<span class="used-tag">${p}</span>`).join('');
            }
        }

        function getRandomLetter() {
            const letters = Object.keys(playersByLetter);
            return letters[Math.floor(Math.random() * letters.length)];
        }

        function isValidPlayer(playerName, letter) {
            const players = playersByLetter[letter] || [];
            const playerLower = playerName.toLowerCase();
            const exists = players.some(p => p.toLowerCase() === playerLower);
            const notUsed = !usedPlayers.some(p => p.toLowerCase() === playerLower);
            return exists && notUsed;
        }

        function getAIPlayer() {
            const availablePlayers = playersByLetter[currentLetter] || [];
            const unused = availablePlayers.filter(p => !usedPlayers.some(used => used.toLowerCase() === p.toLowerCase()));
            if (unused.length === 0) return null;
            return unused[Math.floor(Math.random() * unused.length)];
        }

        function endGame(winner) {
            gameActive = false;
            playerInput.disabled = true;
            submitBtn.disabled = true;
            
            const modal = document.createElement('div');
            modal.className = 'winner-modal';
            modal.innerHTML = `
                <div class="winner-content">
                    <div class="winner-emoji">${winner === 'human' ? '🏆🎉' : '🤖💀'}</div>
                    <div class="winner-name">${winner === 'human' ? 'YOU WIN!' : 'AI WINS!'}</div>
                    <p style="margin-bottom: 20px;">${winner === 'human' ? 'Congratulations! You are the champion!' : 'Better luck next time!'}</p>
                    <button class="play-again-btn" onclick="location.reload()">Play Again</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function switchTurn() {
            if (!gameActive) return;
            
            if (currentTurn === 'human') {
                currentTurn = 'ai';
                turnIndicatorEl.textContent = '🤖 AI\'s Turn';
                turnIndicatorEl.className = 'turn-indicator turn-ai';
                humanCard.classList.remove('active');
                aiCard.classList.add('active');
                playerInput.disabled = true;
                submitBtn.disabled = true;
                showMessage('AI is thinking...');
                
                setTimeout(() => {
                    if (currentTurn === 'ai' && gameActive && !humanEliminated && !aiEliminated) {
                        const aiPlayer = getAIPlayer();
                        if (aiPlayer) {
                            usedPlayers.push(aiPlayer);
                            updateUsedList();
                            showMessage(`🤖 AI said: ${aiPlayer}`);
                            switchTurn();
                        } else {
                            showMessage('🤖 AI cannot name any player! YOU WIN!', false);
                            aiEliminated = true;
                            aiStatus.textContent = 'ELIMINATED ❌';
                            aiCard.classList.add('eliminated');
                            endGame('human');
                        }
                    }
                }, 1500);
            } else {
                currentTurn = 'human';
                turnIndicatorEl.textContent = '👤 YOUR Turn';
                turnIndicatorEl.className = 'turn-indicator turn-human';
                humanCard.classList.add('active');
                aiCard.classList.remove('active');
                playerInput.disabled = false;
                submitBtn.disabled = false;
                playerInput.focus();
                showMessage(`Name a ${currentLetter} player!`);
            }
        }

        function submitPlayer() {
            if (!gameActive) return;
            if (currentTurn !== 'human') {
                showMessage('Wait for your turn!', true);
                return;
            }
            if (humanEliminated || aiEliminated) return;

            const playerName = playerInput.value.trim();
            if (!playerName) {
                showMessage('Please enter a player name!', true);
                return;
            }

            if (!isValidPlayer(playerName, currentLetter)) {
                const players = playersByLetter[currentLetter] || [];
                const exists = players.some(p => p.toLowerCase() === playerName.toLowerCase());
                const notUsed = !usedPlayers.some(p => p.toLowerCase() === playerName.toLowerCase());
                
                if (!exists) {
                    showMessage(`"${playerName}" is not a professional footballer starting with "${currentLetter}"!`, true);
                } else if (!notUsed) {
                    showMessage(`"${playerName}" has already been used!`, true);
                }
                playerInput.value = '';
                return;
            }

            usedPlayers.push(playerName);
            updateUsedList();
            showMessage(`✅ You said: ${playerName}`);
            playerInput.value = '';
            switchTurn();
        }

        function humanOut() {
            if (!gameActive) return;
            if (currentTurn !== 'human') {
                showMessage('Wait for your turn to say "I AM OUT"!', true);
                return;
            }
            if (humanEliminated || aiEliminated) return;
            
            showMessage('You said "I AM OUT". AI wins!', false);
            humanEliminated = true;
            humanStatus.textContent = 'ELIMINATED ❌';
            humanCard.classList.add('eliminated');
            endGame('ai');
        }

        function startNewGame() {
            currentLetter = getRandomLetter();
            currentTurn = 'human';
            gameActive = true;
            humanEliminated = false;
            aiEliminated = false;
            usedPlayers = [];
            
            currentLetterEl.textContent = currentLetter;
            turnIndicatorEl.textContent = '👤 YOUR Turn';
            turnIndicatorEl.className = 'turn-indicator turn-human';
            humanCard.classList.remove('eliminated');
            aiCard.classList.remove('eliminated');
            humanStatus.textContent = 'Playing';
            aiStatus.textContent = 'Playing';
            humanCard.classList.add('active');
            aiCard.classList.remove('active');
            playerInput.disabled = false;
            submitBtn.disabled = false;
            playerInput.value = '';
            updateUsedList();
            showMessage(`Game started! Name a professional footballer starting with "${currentLetter}"`);
            playerInput.focus();
        }

        // Event listeners
        submitBtn.addEventListener('click', submitPlayer);
        outBtn.addEventListener('click', humanOut);
        newGameBtn.addEventListener('click', startNewGame);
        playerInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && currentTurn === 'human' && gameActive) {
                submitPlayer();
            }
        });

        // Initialize
        startNewGame();

        console.log('%c⚽ FOOTBALL PLAYER NAME GAME', 'color: #1a472a; font-size: 16px; font-weight: bold;');
        console.log('%c🎮 How to play:', 'color: #3498db; font-size: 12px;');
        console.log('1. AI randomly picks a letter');
        console.log('2. You name a professional footballer starting with that letter');
        console.log('3. AI will then name another player');
        console.log('4. No repeating players!');
        console.log('5. Say "I AM OUT" if you cannot name a player');
        console.log('6. Last one standing wins!');
    </script>
</body>
</html>
